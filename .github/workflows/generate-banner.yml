name: Generate Banner

on:
  workflow_run:
    workflows: ["Auto Tag"]
    types: [completed]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && !contains(github.event.workflow_run.head_commit.message, '[skip ci]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo 'v0.0.0')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate banner
        env:
          GENERATE_URL: ${{ secrets.STYLEMD_GENERATE_URL }}
          API_KEY: ${{ secrets.STYLEMD_API_KEY }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_DESC: ${{ github.event.repository.description || 'Full-text search for Go. One dependency. Zero config.' }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p .github
          curl -sfG "$GENERATE_URL" \
            --data-urlencode "api_key=$API_KEY" \
            --data-urlencode "name=$REPO_NAME" \
            --data-urlencode "tagline=$REPO_DESC" \
            --data-urlencode "desc=$REPO_DESC" \
            --data-urlencode "version=$VERSION" \
            --data-urlencode "tags=go,search,bm25,full-text,store.md" \
            -o .github/banner.svg

      - name: Commit banner
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/banner.svg
          if git diff --cached --quiet; then
            echo 'No changes to commit'
          else
            git commit -m 'Update banner [skip ci]'
            git push
          fi
